name: Deploy to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      run: dotnet publish -c Release -o publish
      
    # ✅ Install EF Tool
    - name: Install EF Tool
      run: dotnet tool install --global dotnet-ef

    # ✅ Add EF Tool to PATH
    - name: Add .NET tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # 🔥 DB Migration (FIXED CORRECTLY)
    - name: Run DB Migration (PROD)
      run: |
        dotnet ef database update \
          --project ./NewWebAPICore/NewWebAPICore.csproj \
          --startup-project ./NewWebAPICore/NewWebAPICore.csproj
      env:
        ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}

    - name: Deploy to Azure Production Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: "appservice-liveproductapi"
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: publish
